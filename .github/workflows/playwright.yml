name: Playwright E2E Tests & QA Agent Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_agent:
        description: 'Run QA Agent to fetch from Jira and regenerate tests first?'
        required: true
        type: boolean
        default: false
      jira_issue:
        description: 'Jira Issue Key (e.g., PROJ-123) - only used if QA Agent is run'
        required: false
        type: string
        default: 'PROJ-123'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run QA Agent (Dynamic Test Generation)
        if: ${{ github.event.inputs.run_agent == 'true' }}
        env:
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_DRIVE_MASTER_FILE_ID: ${{ secrets.GOOGLE_DRIVE_MASTER_FILE_ID }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          npm start src/index.ts

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com/' }}
        run: npx playwright test

      - name: Upload Playwright Test Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
